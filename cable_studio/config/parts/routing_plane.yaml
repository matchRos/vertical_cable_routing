# Routing plane in base_link, heights along plane normal, grasp planning along trace.

routing_plane_default_id: main
clip_plane_assignments: {}

routing_planes:
  main:
    origin: [0.53, 0.0, 0.08]
    normal: [-1.0, 0.0, 0.0]
    u_axis: [0.0, 0.0, 1.0]
    v_axis: [0.0, 1.0, 0.0]

routing_height_above_plane_m: 0.025
grasp_height_above_plane_m: 0.05
grasp_extra_world_rx_deg: 90.0
initial_left_grasp_position_offset_m: [0.0, -0.005, 0.0]
pregrasp_offset_from_grasp_m: 0.08
world_from_pixel_z_offset_m: 0.1
publish_cartesian_targets_in_world_frame: true
cartesian_targets_world_frame_id: world
cartesian_targets_world_position_offset_m: [0.0, 0.0, 0.0]
detangle_offset_from_routing_m: 0.03

dual_side_second_arm_delta_z_m: -0.1
present_cable_extra_world_rx_deg: 90.0
second_arm_extra_world_ry_deg: -90.0
second_arm_flip_world_y_180: true
dual_side_second_arm_prepose_offset_y_m: 0.08
dual_side_second_arm_prepose_pause_s: 0.5

grasp_min_clearance_from_first_peg_m: 0.08
grasp_second_min_arc_from_first_grasp_m: 0.08
